<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  // Определение макросов
  const macros = {
    "\\l": "\\lambda",  // Определение команды \l
    "\\mb": "\\mathbb",  // Пример другой команды
    // Добавь другие команды здесь
  };

  // Рендеринг всех формул с классом .math
  document.querySelectorAll('.math').forEach(function(element) {
    katex.render(element.textContent, element, {
      macros: macros,  // Передаём макросы
      throwOnError: false,  // Игнорировать ошибки
    });
  });
});
</script>
